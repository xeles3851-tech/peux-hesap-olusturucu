<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peux Hesap Oluşturucu - DEBUG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; overflow-x: hidden; color: #e0e0e0; font-family: 'Inter', sans-serif; }
    .background-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
    .shape { position: absolute; background: rgba(255,255,255,0.05); border-radius: 50%; filter: blur(20px); }
    .glow-button { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .glow-button::before { content: ''; position: absolute; top: 50%; left: 50%; width: 300%; height: 300%; background: radial-gradient(circle, rgba(255,255,255,0.3), transparent); transform: translate(-50%, -50%) scale(0); transition: transform 0.5s ease; }
    .glow-button:hover::before { transform: translate(-50%, -50%) scale(1); }
    .glow-button:hover { box-shadow: 0 0 25px rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="background-shapes">
    <div class="shape" style="width:200px;height:200px;top:10%;left:20%;"></div>
    <div class="shape" style="width:150px;height:150px;top:60%;left:70%;"></div>
    <div class="shape" style="width:100px;height:100px;top:30%;left:50%;"></div>
  </div>

  <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4">
    <h1 class="text-4xl font-bold mb-8 text-white animate-pulse">Peux Hesap Oluşturucu - DEBUG</h1>

    <div class="w-full max-w-md bg-gray-900 bg-opacity-50 p-8 rounded-lg shadow-lg backdrop-blur-md">
      <div class="mb-6">
        <label for="accountCount" class="block text-sm font-medium mb-2">Kaç Adet Hesap Oluşturulacak?</label>
        <input type="number" id="accountCount" min="1" value="3" class="w-full px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button id="startButton" class="glow-button w-full px-4 py-3 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 text-lg">🚀 Hesapları Oluştur (DEBUG)</button>
    </div>

    <div id="status" class="mt-4 text-center text-lg font-medium"></div>
  </div>

  <script>
    console.log("✅ Script yüklendi - DEBUG MOD AKTİF");
    const API_URL = 'https://peux-backend-production.up.railway.app';
    console.log("API_URL:", API_URL);

    const startButton = document.getElementById('startButton');
    startButton.addEventListener('click', () => {
      console.log("🚀 Butona basıldı!");
      alert("Buton çalıştı! Console'a bak.");
    });
  </script>
</body>
</html>
